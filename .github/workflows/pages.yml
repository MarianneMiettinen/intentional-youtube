# Deploy the repo root as plain static files to GitHub Pages.
# No Jekyll, no build step — privacy-policy.html is served exactly as-is.
name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; skip queued runs but don't cancel in-progress ones.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # serve the repo root — no build, no processing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
